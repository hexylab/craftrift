<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CraftRift</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #error {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      color: #e94560;
      font-family: monospace;
      font-size: 1.5rem;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="error">WebGL is not supported in this browser.</div>
  <div id="crosshair" style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 24px;
  font-family: monospace;
  pointer-events: none;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  z-index: 10;
">+</div>
  <div id="instructions" style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-family: monospace;
  font-size: 1.2rem;
  text-align: center;
  background: rgba(0,0,0,0.7);
  padding: 2rem;
  border-radius: 8px;
  z-index: 20;
">Click to play<br><small>WASD: Move | Mouse: Look | Left Click: Break | Right Click: Place</small></div>
  <div id="target-info" style="
    display: none;
    position: fixed;
    bottom: 60%;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: monospace;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  ">
    <div id="target-name" style="font-size: 14px; margin-bottom: 4px;"></div>
    <div id="hp-bar-container" style="
      width: 200px;
      height: 8px;
      background: rgba(0,0,0,0.6);
      border-radius: 4px;
      overflow: hidden;
    ">
      <div id="hp-bar-fill" style="height: 100%; transition: width 0.1s;"></div>
    </div>
    <div id="hp-text" style="font-size: 12px; margin-top: 2px; opacity: 0.8;"></div>
  </div>
  <div id="combat-feedback" style="
    display: none;
    position: fixed;
    top: 60%;
    left: 50%;
    transform: translateX(-50%);
    color: #ff6666;
    font-family: monospace;
    font-size: 14px;
    pointer-events: none;
    z-index: 10;
  "></div>
  <div id="victory-screen" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    color: white;
    font-family: monospace;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 100;
  ">
    <h1 style="font-size: 4rem; color: #ffd700;">VICTORY</h1>
    <p style="font-size: 1.2rem; margin-top: 1rem;">敵ネクサスを破壊した！</p>
  </div>
  <div id="player-hp" style="
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: monospace;
    color: white;
    pointer-events: none;
    z-index: 10;
  ">
    <div id="player-hp-bar-container" style="
      width: 200px;
      height: 10px;
      background: rgba(0,0,0,0.6);
      border-radius: 5px;
      overflow: hidden;
    ">
      <div id="player-hp-bar-fill" style="
        height: 100%;
        width: 100%;
        background-color: #44bb44;
        transition: width 0.1s;
      "></div>
    </div>
    <div id="player-hp-text" style="font-size: 12px; margin-top: 2px; opacity: 0.8;">100 / 100</div>
  </div>
  <div id="death-overlay" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    color: white;
    font-family: monospace;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 50;
  ">
    <h2 style="font-size: 2.5rem; color: #dd3333;">DEAD</h2>
    <p id="respawn-timer" style="font-size: 1.5rem; margin-top: 1rem;">リスポーンまで: 5秒</p>
  </div>
  <div id="tower-warning" style="
    display: none;
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 14px;
    color: #ff6666;
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
  ">タワーに狙われています</div>
  <div id="damage-flash" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 0, 0, 0.3);
    pointer-events: none;
    z-index: 40;
  "></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
